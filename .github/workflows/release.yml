name: Release

# Publishes to npm with a signed SLSA provenance attestation.
#
# Auth precedence npm applies:
#   1. If the package has a Trusted Publisher configured pointing at this repo
#      + this workflow file, OIDC alone is enough (id-token: write below).
#   2. Otherwise, NODE_AUTH_TOKEN (from the NPM_TOKEN secret) is used.
#
# Trusted Publisher can't be configured on npm until the package exists there,
# so the seed publish uses NPM_TOKEN. Once the package exists, configure
# Trusted Publisher on its settings page and the NPM_TOKEN secret becomes
# unused (safe to delete).
# https://docs.npmjs.com/trusted-publishers/
# https://docs.npmjs.com/generating-provenance-statements
#
# Triggered when a v* tag is pushed:
#   git tag v0.1.0 && git push --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # for creating the GitHub Release
  id-token: write        # for npm OIDC (provenance + trusted publishing)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm (OIDC → provenance; NPM_TOKEN fallback for seed)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
