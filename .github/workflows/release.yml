name: Release

# Publishes to npm via Trusted Publishing (OIDC), no long-lived tokens.
# Requires the npm package's Trusted Publisher settings to point at this repo
# and this workflow file. See https://docs.npmjs.com/trusted-publishers/.
#
# Triggered when a v* tag is pushed:
#   git tag v0.1.0 && git push --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write        # for creating the GitHub Release
  id-token: write        # for npm OIDC (provenance + trusted publishing)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm (OIDC, provenance)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
